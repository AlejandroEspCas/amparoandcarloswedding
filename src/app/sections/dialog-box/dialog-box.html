<div class="custom-modal">
  <app-dynamic-text textKey="RSVP.TITLE" type="h1" customClass="modal-title"></app-dynamic-text>

  <form [formGroup]="form" (ngSubmit)="submit()" class="modal-form">
    <div class="form-group">
      <app-dynamic-text
        textKey="RSVP.LABEL_NAME"
        type="span"
        customClass="form-label"
      ></app-dynamic-text>
      <input
        id="nombre"
        type="text"
        formControlName="nombre"
        [class.error]="form.get('nombre')?.invalid && form.get('nombre')?.touched"
      />
    </div>

    <div class="form-group">
      <app-dynamic-text
        textKey="RSVP.INPUT_ASISTANCE.LABEL"
        type="span"
        customClass="form-label"
      ></app-dynamic-text>
      <select id="asistencia" formControlName="asistencia">
        <option value="yes">
          <app-dynamic-text
            textKey="RSVP.INPUT_ASISTANCE.OPTION_ONE_LABEL"
            type="span"
          ></app-dynamic-text>
        </option>
        <option value="no">
          <app-dynamic-text
            textKey="RSVP.INPUT_ASISTANCE.OPTION_TWO_LABEL"
            type="span"
          ></app-dynamic-text>
        </option>
      </select>
    </div>

    <div class="extra-fields" [class.is-visible]="form.get('asistencia')?.value === 'yes'">
      <div class="form-group">
        <app-dynamic-text
          textKey="RSVP.LABEL_INVITES"
          type="span"
          customClass="form-label"
        ></app-dynamic-text>
        <input
          id="invitados"
          type="number"
          formControlName="invitados"
          placeholder="0"
          [class.error]="form.get('invitados')?.invalid && form.get('invitados')?.touched"
        />
      </div>

      <div class="form-group">
        <app-dynamic-text
          textKey="RSVP.LABEL_ALERGIES"
          type="span"
          customClass="form-label"
        ></app-dynamic-text>
        <input
          id="alergias"
          type="text"
          formControlName="alergias"
          [class.error]="form.get('alergias')?.invalid && form.get('alergias')?.touched"
        />
      </div>
    </div>
  </form>

  <div class="button-container">
    <button [disabled]="form.invalid" class="btn-submit" (click)="submit()">
      <app-dynamic-text textKey="RSVP.BTN_SUBMIT" type="span"></app-dynamic-text>
    </button>
    <button type="button" class="btn-cancel" (click)="cancel()">
      <app-dynamic-text textKey="RSVP.BTN_CANCEL" type="span"></app-dynamic-text>
    </button>
  </div>
</div>
